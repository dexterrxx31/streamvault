<div class="upload-overlay animate-fade-in" (click)="onBackdropClick($event)">
    <div class="upload-dialog glass-card animate-fade-in-up">
        <div class="dialog-header">
            <h2>Upload Video</h2>
            <button class="dialog-close" (click)="onClose()" [disabled]="uploading">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>
        </div>

        @if (error) {
        <div class="upload-error animate-slide-down">
            {{ error }}
        </div>
        }

        <!-- Drop Zone -->
        @if (!selectedFile) {
        <div class="drop-zone" [class.drag-over]="dragOver" (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
            <div class="drop-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                </svg>
            </div>
            <p class="drop-text">Drag & drop your video here</p>
            <p class="drop-subtext">or</p>
            <label class="btn btn-ghost btn-sm drop-browse">
                Browse Files
                <input type="file" accept="video/*" (change)="onFileSelect($event)" hidden />
            </label>
            <p class="drop-hint">Supports MP4, WebM, MOV, AVI • Max 500MB</p>
        </div>
        } @else {
        <!-- File selected -->
        <div class="file-preview">
            <div class="file-icon">🎬</div>
            <div class="file-info">
                <p class="file-name">{{ selectedFile.name }}</p>
                <p class="file-size">{{ formatSize(selectedFile.size) }}</p>
            </div>
            @if (!uploading) {
            <button class="btn btn-ghost btn-sm" (click)="selectedFile = null; title = ''">Change</button>
            }
        </div>

        <div class="form-group">
            <label for="videoTitle">Video Title</label>
            <input id="videoTitle" type="text" class="form-input" placeholder="Give your video a title"
                [(ngModel)]="title" [disabled]="uploading" />
        </div>

        @if (uploading) {
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" [style.width.%]="progress"></div>
            </div>
            <span class="progress-text">{{ progress }}%</span>
        </div>
        }

        <button class="btn btn-primary btn-lg upload-submit" (click)="onUpload()" [disabled]="uploading">
            @if (uploading) {
            <span class="spinner"></span>
            Uploading...
            } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
            </svg>
            Upload Video
            }
        </button>
        }
    </div>
</div>
