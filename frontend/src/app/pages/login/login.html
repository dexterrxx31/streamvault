<div class="auth-page">
    <div class="auth-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-container animate-fade-in-up">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <a routerLink="/" class="auth-logo">Stream<span class="text-gradient">Vault</span></a>
                <h2>Welcome Back</h2>
                <p>Sign in to access your videos</p>
            </div>

            @if (error) {
            <div class="auth-error animate-slide-down">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M15 9l-6 6M9 9l6 6" />
                </svg>
                {{ error }}
            </div>
            }

            <form (ngSubmit)="onSubmit()" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" type="text" class="form-input" placeholder="Enter your username"
                        [(ngModel)]="username" name="username" autocomplete="username" />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" class="form-input" placeholder="Enter your password"
                        [(ngModel)]="password" name="password" autocomplete="current-password" />
                </div>

                <button type="submit" class="btn btn-primary btn-lg auth-submit" [disabled]="loading">
                    @if (loading) {
                    <span class="spinner"></span>
                    Signing in...
                    } @else {
                    Sign In
                    }
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a routerLink="/signup">Sign up</a>
            </div>
        </div>
    </div>
</div>
